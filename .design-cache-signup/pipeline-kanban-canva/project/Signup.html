<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; color: #1d1a24; -webkit-font-smoothing: antialiased; }
.mso { font-family: 'Material Symbols Outlined'; line-height: 1; user-select: none; display: inline-block; }
input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
  -webkit-text-fill-color: #1d1a24;
  -webkit-box-shadow: 0 0 0 1000px #ffffff inset;
  box-shadow: 0 0 0 1000px #ffffff inset;
  transition: background-color 9999s ease-in-out 0s;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: #dde1ec; border-radius: 4px; }

@keyframes floatY {
  0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
  50% { transform: translateY(-8px) rotate(var(--r, 0deg)); }
}
@keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes shineBar {
  0% { transform: translateX(-120%); }
  100% { transform: translateX(220%); }
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes stepIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
.fade-in { animation: fadeIn 0.3s ease; }
.float-1 { animation: floatY 6s ease-in-out infinite; }
.float-2 { animation: floatY 7s ease-in-out infinite -2s; }
.float-3 { animation: floatY 8s ease-in-out infinite -4s; }

.dot-grid {
  background-image: radial-gradient(rgba(255,255,255,0.18) 1px, transparent 1px);
  background-size: 18px 18px;
}
.shine-bar::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
  transform: translateX(-120%);
  animation: shineBar 2.6s ease-in-out infinite 1s;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// omnicrm.chat — Signup / Workspace onboarding
const { useState, useEffect, useMemo } = React;

// ── Tokens ─────────────────────────────────────────────────────────────────
const C = {
  primary: '#4338ca', primaryContainer: '#4f46e5', primaryHover: '#632ce5',
  accent: '#7C4DFF',
  gradFrom: '#4A1DB5', gradVia: '#632ce5', gradTo: '#7C4DFF',
  surface: '#f8fafc', surfaceLowest: '#ffffff',
  surfaceContainer: '#eef2ff', surfaceContainerHigh: '#e8ecf8',
  outline: '#7a7487', outlineVariant: '#E9ECEF',
  onSurface: '#1d1a24', secondary: '#575f67',
  error: '#ba1a1a', errorBg: '#ffdad6',
  success: '#10B981', successBg: '#ecfdf5',
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "brandPanel": "onboarding",
  "showSSO": true,
  "showWorkspace": true,
  "accent": "purple"
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  purple: { from: '#4A1DB5', via: '#632ce5', to: '#7C4DFF',  btn: '#7C4DFF', btnHover: '#632ce5' },
  indigo: { from: '#312e81', via: '#4338ca', to: '#6366f1',  btn: '#4f46e5', btnHover: '#4338ca' },
  ocean:  { from: '#0c4a6e', via: '#1d4ed8', to: '#0ea5e9',  btn: '#2563eb', btnHover: '#1d4ed8' },
};

// ── Icons / atoms ──────────────────────────────────────────────────────────
function Mso({ name, size = 20, fill = 0, weight = 400, style }) {
  return (
    <span className="mso" style={{
      fontSize: size,
      fontVariationSettings: `'FILL' ${fill}, 'wght' ${weight}, 'GRAD' 0, 'opsz' 24`,
      ...style,
    }}>{name}</span>
  );
}

function BrandMark({ size = 36 }) {
  return (
    <svg viewBox="0 0 40 40" width={size} height={size} style={{ display: 'block' }}>
      <rect width="40" height="40" rx="11" fill="rgba(255,255,255,0.14)" />
      <rect x="1.5" y="1.5" width="37" height="37" rx="9.5" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="0.75"/>
      <path d="M 20 9 A 12 12 0 0 1 31.2 26.2" fill="none" stroke="#ffffff" strokeWidth="4.2" strokeLinecap="round"/>
      <path d="M 31.2 26.2 A 12 12 0 0 1 8.8 26.2" fill="none" stroke="#c7d2fe" strokeWidth="4.2" strokeLinecap="round"/>
      <path d="M 8.8 26.2 A 12 12 0 0 1 20 9" fill="none" stroke="#ffffff" strokeWidth="4.2" strokeLinecap="round" opacity="0.55"/>
    </svg>
  );
}

// ── Brand panel: Onboarding (default) ──────────────────────────────────────

    <div style={{ position: 'relative', flex: 1, padding: '40px 56px', display: 'flex', flexDirection: 'column', gap: 24, color: '#fff', overflow: 'hidden' }}>

      <div className="dot-grid" style={{ position: 'absolute', inset: 0, opacity: 0.45, pointerEvents: 'none' }} />

        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <BrandMark size={40} />
          <div>
            <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.02em' }}>omnicrm.chat</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', letterSpacing: '0.04em', textTransform: 'uppercase', fontWeight: 600 }}>Workspace onboarding</div>
          </div>
        </div>
        <a href="#" style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          padding: '6px 12px', borderRadius: 999,
          background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.18)',
          fontSize: 12, fontWeight: 600, color: '#fff', textDecoration: 'none',

          <Mso name="arrow_back" size={14} />

      </div>

      {/* Headline */}

        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '6px 12px', borderRadius: 999, background: 'rgba(255,255,255,0.12)', border: '1px solid rgba(255,255,255,0.18)', fontSize: 12, fontWeight: 600, marginBottom: 18 }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#22C55E', animation: 'pulseDot 2s ease-in-out infinite' }} />

        </div>
        <h1 style={{ fontSize: 36, lineHeight: 1.1, fontWeight: 700, letterSpacing: '-0.025em', maxWidth: 460 }}>
          Bring every customer<br/>
          conversation<br/>
          <span style={{ color: '#e0e7ff', fontStyle: 'italic', fontWeight: 600 }}>into one workspace.</span>
        </h1>
        <p style={{ marginTop: 14, fontSize: 14, lineHeight: 1.6, color: 'rgba(255,255,255,0.78)', maxWidth: 440 }}>
          WhatsApp, Telegram, Email and SMS — centralized with AI-assisted replies and a built-in sales pipeline.
        </p>
      </div>

      {/* Steps timeline */}
      <div style={{ position: 'relative', flex: 1, marginTop: 4, display: 'flex', flexDirection: 'column', gap: 14, maxWidth: 460 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.6)' }}>
          What happens next
        </div>
        {steps.map((s, i) => (
          <div key={s.n} style={{
            position: 'relative', display: 'flex', gap: 14, alignItems: 'flex-start',
            paddingBottom: i < steps.length - 1 ? 14 : 0,
            animation: `stepIn 0.4s ease ${i * 0.08}s both`,
          }}>
            <div style={{
              flexShrink: 0, width: 32, height: 32, borderRadius: 10,
              background: s.active ? '#fff' : 'rgba(255,255,255,0.1)',
              border: s.active ? 'none' : '1px solid rgba(255,255,255,0.22)',
              color: s.active ? C.accent : 'rgba(255,255,255,0.85)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 11, fontWeight: 700, letterSpacing: '-0.01em',
              boxShadow: s.active ? '0 4px 14px -4px rgba(255,255,255,0.6)' : 'none',
            }}>
              {s.n}
            </div>
            {i < steps.length - 1 && (
              <div style={{
                position: 'absolute', left: 16, top: 32, width: 1,
                height: 'calc(100% - 12px)',
                background: 'rgba(255,255,255,0.18)',
              }} />
            )}
            <div style={{ flex: 1, paddingTop: 2 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: '#fff', display: 'flex', alignItems: 'center', gap: 8 }}>
                {s.t}
                {s.active && (
                  <span style={{ fontSize: 10, fontWeight: 700, color: '#fff', background: 'rgba(255,255,255,0.18)', padding: '2px 6px', borderRadius: 999, letterSpacing: '0.04em', textTransform: 'uppercase' }}>You're here</span>
                )}
              </div>
              <div style={{ fontSize: 12.5, lineHeight: 1.5, color: 'rgba(255,255,255,0.72)', marginTop: 2 }}>
                {s.d}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Footer trust */}
      <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, paddingTop: 16, borderTop: '1px solid rgba(255,255,255,0.14)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 18, fontSize: 12, color: 'rgba(255,255,255,0.72)' }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Mso name="shield" size={14} fill={1} /> SOC 2 Type II
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Mso name="lock" size={14} fill={1} /> GDPR / LGPD
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Mso name="bolt" size={14} fill={1} /> 99.98% uptime
          </span>
        </div>
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.55)' }}>© 2026 omnicrm.chat</div>
      </div>
    </div>
  );
}

// ── Password strength helpers ───────────────────────────────────────────────
function evaluatePassword(pw) {
  const checks = {
    length: pw.length >= 8,
    upper: /[A-Z]/.test(pw),
    lower: /[a-z]/.test(pw),
    number: /\d/.test(pw),
    symbol: /[^A-Za-z0-9]/.test(pw),
  };
  const score = Object.values(checks).filter(Boolean).length;
  let label = 'Too short', color = '#cbd5e1';
  if (pw.length === 0) { label = '', color = '#cbd5e1'; }
  else if (score <= 2) { label = 'Weak', color = '#EF4444'; }
  else if (score === 3) { label = 'Fair', color = '#F59E0B'; }
  else if (score === 4) { label = 'Good', color = '#7C4DFF'; }
  else { label = 'Strong', color = '#10B981'; }
  return { checks, score, label, color };
}

// ── Form ────────────────────────────────────────────────────────────────────

  const [error, setError] = useState('');
  const [submitted, setSubmitted] = useState(false);

  const tone = ACCENT_MAP[accent] || ACCENT_MAP.purple;

  const mismatch = confirm.length > 0 && confirm !== pass;

  const submit = (e) => {

      return;

      setError('Please choose a stronger password (at least 8 chars + mixed case + number).');
      return;
    }

      setError('Passwords don\u2019t match.');
      return;
    }
    if (!terms) {
      setError('You need to accept the terms to continue.');
      return;

        </p>
        <div style={{
          padding: 14, borderRadius: 12,
          background: '#f8fafc', border: `1px solid ${C.outlineVariant}`,
          display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 18,
        }}>
          <Mso name="info" size={18} fill={1} style={{ color: tone.btn, marginTop: 1 }} />
          <div style={{ fontSize: 13, color: C.secondary, lineHeight: 1.5 }}>
            Didn\u2019t get the email? Check your spam folder or{' '}
            <a href="#" style={{ color: tone.btn, fontWeight: 600, textDecoration: 'none' }}>resend it</a>.
          </div>
        </div>
        <a href="Login.html" style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          width: '100%', height: 46, borderRadius: 12,
          background: tone.btn, color: '#fff', fontSize: 14, fontWeight: 600,
          textDecoration: 'none',
          boxShadow: '0 10px 20px -8px rgba(124,77,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2)',
        }}>
          Go to sign in
          <Mso name="arrow_forward" size={18} weight={500} />
        </a>
      </div>
    );
  }

  return (
    <div style={{ width: '100%', maxWidth: 420 }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em', color: C.onSurface, marginBottom: 6 }}>
          Request workspace access
        </h2>
        <p style={{ fontSize: 14, color: C.secondary, lineHeight: 1.55 }}>
          Tell us about you and your team so we can review and release platform access.
        </p>
      </div>

      {showSSO && (
        <>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
            <SsoButton provider="google" label="Sign up with Google" />
            <SsoButton provider="microsoft" label="Sign up with Microsoft" />
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '4px 0 16px', color: C.secondary, fontSize: 12 }}>
            <div style={{ flex: 1, height: 1, background: C.outlineVariant }} />
            <span style={{ fontWeight: 500 }}>or sign up with email</span>
            <div style={{ flex: 1, height: 1, background: C.outlineVariant }} />
          </div>
        </>
      )}

      <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Field
          label="Full name"
          icon="person"
          placeholder="Jane Doe"
          value={name}
          onChange={setName}
          accent={tone}
        />

        <Field
          label="Work email"
          icon="mail"
          type="email"
          placeholder="you@company.com"
          value={email}
          onChange={setEmail}
          accent={tone}
        />

        {showWorkspace && (
          <Field
            label="Workspace name"
            icon="domain"
            placeholder="Acme Support"

            value={workspace}
            onChange={setWorkspace}

          />

        <div>

          {pass.length > 0 && (

        <div>
          <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: C.onSurface, marginBottom: 6 }}>Confirm password</label>

            onChange={setConfirm}
            show={showPass}
            toggle={() => setShowPass(s => !s)}

            accent={tone}
            error={mismatch}

          {mismatch && (

        {error && (
          <div className="fade-in" style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', borderRadius: 10, background: C.errorBg, color: '#93000a', fontSize: 13, fontWeight: 500 }}>
            <Mso name="error" size={16} fill={1} />

        )}

          <span style={{ position: 'relative', display: 'inline-block', width: 16, height: 16, marginTop: 2, flexShrink: 0 }}>
            <input
              type="checkbox"
              checked={terms}
              onChange={(e) => setTerms(e.target.checked)}
              style={{ position: 'absolute', opacity: 0, width: 16, height: 16, margin: 0, cursor: 'pointer' }}
            />
            <span style={{
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              width: 16, height: 16, borderRadius: 4,
              background: terms ? tone.btn : '#fff',
              border: `1.5px solid ${terms ? tone.btn : '#cbd5e1'}`,
              transition: 'all 0.15s',
            }}>
              {terms && <Mso name="check" size={12} fill={1} weight={700} style={{ color: '#fff' }} />}
            </span>
          </span>
          <span>

            <a href="#" style={{ color: tone.btn, fontWeight: 600, textDecoration: 'none' }}>Privacy Policy</a>.
          </span>
        </label>

        <button
          type="submit"
          disabled={loading}

            color: '#fff', fontSize: 14, fontWeight: 600,

            boxShadow: '0 10px 20px -8px rgba(124,77,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2)',

          onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
          onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
        >
          {loading ? (
            <>
              <Mso name="progress_activity" size={18} style={{ animation: 'spin 0.9s linear infinite' }} />
              Submitting…
            </>
          ) : (
            <>
              Submit request
              <Mso name="arrow_forward" size={18} weight={500} />
            </>
          )}
        </button>
      </form>

      <div style={{ marginTop: 20, paddingTop: 18, borderTop: `1px solid ${C.outlineVariant}`, fontSize: 13, color: C.secondary, textAlign: 'center' }}>
        Already have an account?{' '}
        <a href="Login.html" style={{ color: tone.btn, fontWeight: 600, textDecoration: 'none' }}>Sign in</a>
      </div>
    </div>
  );
}

function PasswordStrength({ strength }) {
  const segments = 4;
  const filled = Math.min(segments, Math.max(1, strength.score - 1));
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: 'flex', gap: 4, marginBottom: 6 }}>
        {Array.from({ length: segments }).map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 4, borderRadius: 4,
            background: i < filled ? strength.color : '#eef2f6',
            transition: 'background 0.2s',
          }} />
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 11.5 }}>
        <span style={{ color: C.secondary }}>
          Use 8+ chars with mixed case, numbers and symbols.
        </span>
        <span style={{ color: strength.color, fontWeight: 600 }}>{strength.label}</span>
      </div>
    </div>
  );
}

function Field({ label, icon, type = 'text', placeholder, value, onChange, accent, hint }) {
  const [focused, setFocused] = useState(false);
  return (
    <div>
      <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: C.onSurface, marginBottom: 6 }}>{label}</label>
      <div style={{
        position: 'relative',
        display: 'flex', alignItems: 'center',
        height: 46, borderRadius: 12,
        background: focused ? '#fff' : '#f8fafc',
        border: `1.5px solid ${focused ? accent.btn : C.outlineVariant}`,
        boxShadow: focused ? `0 0 0 4px ${accent.btn}1f` : 'none',
        transition: 'all 0.15s',
      }}>
        <Mso name={icon} size={18} style={{ color: focused ? accent.btn : C.outline, marginLeft: 14 }} />
        <input
          type={type}
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{
            flex: 1, height: '100%',
            border: 'none', outline: 'none', background: 'transparent',
            padding: '0 14px', fontSize: 14, color: C.onSurface,
            fontFamily: 'inherit',
          }}
        />
      </div>
      {hint && (
        <div style={{ marginTop: 6, fontSize: 11.5, color: C.secondary, lineHeight: 1.4 }}>
          {hint}
        </div>
      )}
    </div>
  );
}

function PasswordField({ value, onChange, show, toggle, accent, placeholder, error }) {
  const [focused, setFocused] = useState(false);
  const borderColor = error ? C.error : (focused ? accent.btn : C.outlineVariant);
  const ringColor = error ? `${C.error}26` : `${accent.btn}1f`;
  return (
    <div style={{
      position: 'relative',
      display: 'flex', alignItems: 'center',
      height: 46, borderRadius: 12,
      background: focused ? '#fff' : '#f8fafc',
      border: `1.5px solid ${borderColor}`,
      boxShadow: (focused || error) ? `0 0 0 4px ${ringColor}` : 'none',
      transition: 'all 0.15s',
    }}>
      <Mso name="lock" size={18} style={{ color: error ? C.error : (focused ? accent.btn : C.outline), marginLeft: 14 }} />
      <input
        type={show ? 'text' : 'password'}
        placeholder={placeholder || '••••••••'}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        style={{
          flex: 1, height: '100%',
          border: 'none', outline: 'none', background: 'transparent',
          padding: '0 14px', fontSize: 14, color: C.onSurface,
          fontFamily: 'inherit', letterSpacing: show || value.length === 0 ? 'normal' : '0.18em',
        }}
      />
      <button
        type="button"
        onClick={toggle}
        style={{
          width: 38, height: 32, marginRight: 6,
          border: 'none', background: 'transparent', cursor: 'pointer',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          color: C.secondary, borderRadius: 8,
        }}
        title={show ? 'Hide password' : 'Show password'}
      >
        <Mso name={show ? 'visibility_off' : 'visibility'} size={18} />
      </button>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────────
