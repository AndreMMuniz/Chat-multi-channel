            <SsoButton provider="microsoft" label="Continuar com Microsoft" />
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '6px 0 18px', color: C.secondary, fontSize: 12 }}>
            <div style={{ flex: 1, height: 1, background: C.outlineVariant }} />
            <span style={{ fontWeight: 500 }}>ou continue com e-mail</span>
            <div style={{ flex: 1, height: 1, background: C.outlineVariant }} />
          </div>
        </>
      )}

      <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Field
          label="E-mail corporativo"
          icon="mail"
          type="email"
          placeholder="voce@empresa.com"
          value={email}
          onChange={setEmail}
          accent={tone}
        />

        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <label style={{ fontSize: 13, fontWeight: 600, color: C.onSurface }}>Senha</label>
            <a href="#" style={{ fontSize: 12, fontWeight: 600, color: tone.btn, textDecoration: 'none' }}>Esqueceu a senha?</a>
          </div>
          <PasswordField
            value={pass}
            onChange={setPass}
            show={showPass}
            toggle={() => setShowPass(s => !s)}
            accent={tone}
          />
        </div>

        {error && (
          <div className="fade-in" style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', borderRadius: 10, background: C.errorBg, color: '#93000a', fontSize: 13, fontWeight: 500 }}>
            <Mso name="error" size={16} fill={1} />
            {error}
          </div>
        )}

        {showRemember && (
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: C.secondary, cursor: 'pointer', userSelect: 'none', marginTop: 2 }}>
            <span style={{ position: 'relative', display: 'inline-block', width: 16, height: 16 }}>
              <input
                type="checkbox"
                checked={remember}
                onChange={(e) => setRemember(e.target.checked)}
                style={{ position: 'absolute', opacity: 0, width: 16, height: 16, margin: 0, cursor: 'pointer' }}
              />
              <span style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                width: 16, height: 16, borderRadius: 4,
                background: remember ? tone.btn : '#fff',
                border: `1.5px solid ${remember ? tone.btn : '#cbd5e1'}`,
                transition: 'all 0.15s',
              }}>
                {remember && <Mso name="check" size={12} fill={1} weight={700} style={{ color: '#fff' }} />}
              </span>
            </span>
            Lembrar de mim por 30 dias
          </label>
        )}

        <button
          type="submit"
          disabled={loading}
          style={{
            marginTop: 8, height: 46, borderRadius: 12,
            background: loading ? tone.btnHover : tone.btn,
            color: '#fff', fontSize: 14, fontWeight: 600,
            border: 'none', cursor: loading ? 'wait' : 'pointer',
            boxShadow: '0 10px 20px -8px rgba(124,77,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            transition: 'transform 0.08s, background 0.15s',
          }}
          onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.98)'}
          onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
          onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
        >
          {loading ? (
            <>
              <Mso name="progress_activity" size={18} style={{ animation: 'spin 0.9s linear infinite' }} />
              Entrando…
            </>
          ) : (
            <>
              Entrar
              <Mso name="arrow_forward" size={18} weight={500} />
            </>
          )}
        </button>
      </form>

      <div style={{ marginTop: 22, paddingTop: 18, borderTop: `1px solid ${C.outlineVariant}`, fontSize: 13, color: C.secondary, textAlign: 'center' }}>
        Ainda não tem conta?{' '}
        <a href="#" style={{ color: tone.btn, fontWeight: 600, textDecoration: 'none' }}>Solicitar acesso</a>
      </div>

      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

function Field({ label, icon, type = 'text', placeholder, value, onChange, accent }) {
  const [focused, setFocused] = useState(false);
  return (
    <div>
      <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: C.onSurface, marginBottom: 6 }}>{label}</label>
      <div style={{
        position: 'relative',
        display: 'flex', alignItems: 'center',
        height: 46, borderRadius: 12,
        background: focused ? '#fff' : '#f8fafc',
        border: `1.5px solid ${focused ? accent.btn : C.outlineVariant}`,
        boxShadow: focused ? `0 0 0 4px ${accent.btn}1f` : 'none',
        transition: 'all 0.15s',
      }}>
        <Mso name={icon} size={18} style={{ color: focused ? accent.btn : C.outline, marginLeft: 14 }} />
        <input
          type={type}
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{
            flex: 1, height: '100%',
            border: 'none', outline: 'none', background: 'transparent',
            padding: '0 14px', fontSize: 14, color: C.onSurface,
            fontFamily: 'inherit',
          }}
        />
      </div>
    </div>
  );
}

function PasswordField({ value, onChange, show, toggle, accent }) {
  const [focused, setFocused] = useState(false);
  return (
    <div style={{
      position: 'relative',
      display: 'flex', alignItems: 'center',
      height: 46, borderRadius: 12,
      background: focused ? '#fff' : '#f8fafc',
      border: `1.5px solid ${focused ? accent.btn : C.outlineVariant}`,
      boxShadow: focused ? `0 0 0 4px ${accent.btn}1f` : 'none',
      transition: 'all 0.15s',
    }}>
      <Mso name="lock" size={18} style={{ color: focused ? accent.btn : C.outline, marginLeft: 14 }} />
      <input
        type={show ? 'text' : 'password'}
        placeholder="••••••••"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        style={{
          flex: 1, height: '100%',
          border: 'none', outline: 'none', background: 'transparent',
          padding: '0 14px', fontSize: 14, color: C.onSurface,
          fontFamily: 'inherit', letterSpacing: show ? 'normal' : '0.18em',
        }}
      />
      <button
        type="button"
        onClick={toggle}
        style={{
          width: 38, height: 32, marginRight: 6,
          border: 'none', background: 'transparent', cursor: 'pointer',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          color: C.secondary, borderRadius: 8,
        }}
        title={show ? 'Ocultar senha' : 'Mostrar senha'}
      >
        <Mso name={show ? 'visibility_off' : 'visibility'} size={18} />
      </button>
    </div>
  );
}

function SsoButton({ provider, label }) {
  const logos = {
    google: (
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path fill="#EA4335" d="M12 5.04c1.62 0 3.07.56 4.21 1.65l3.15-3.15C17.45 1.7 14.97.62 12 .62 7.7.62 3.99 3.08 2.18 6.67l3.66 2.84C6.7 6.91 9.13 5.04 12 5.04z"/>
        <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.28 1.4-1.04 2.59-2.21 3.42v2.77h3.57c2.08-1.92 3.66-4.74 3.66-8.43z"/>
        <path fill="#FBBC05" d="M5.84 14.09a7.06 7.06 0 0 1 0-4.18L2.18 7.07a11.94 11.94 0 0 0 0 9.86l3.66-2.84z"/>
        <path fill="#34A853" d="M12 23.38c3.24 0 5.95-1.07 7.93-2.91l-3.57-2.77c-.99.67-2.27 1.07-4.36 1.07-2.87 0-5.3-1.88-6.16-4.51l-3.66 2.84C3.99 20.92 7.7 23.38 12 23.38z"/>
      </svg>
    ),
    microsoft: (
      <svg viewBox="0 0 24 24" width="16" height="16">
        <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
        <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
        <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
        <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
      </svg>
    ),
  };
  return (
    <button
      type="button"
      style={{
        height: 44, borderRadius: 12,
        background: '#fff', border: `1.5px solid ${C.outlineVariant}`,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        fontSize: 14, fontWeight: 600, color: C.onSurface,
        cursor: 'pointer', transition: 'all 0.15s',
        fontFamily: 'inherit',
      }}
      onMouseEnter={(e) => { e.currentTarget.style.background = '#f8fafc'; e.currentTarget.style.borderColor = '#cbd5e1'; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = '#fff'; e.currentTarget.style.borderColor = C.outlineVariant; }}
    >
      {logos[provider]}
      {label}
    </button>
  );
}

// ── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const tone = ACCENT_MAP[t.accent] || ACCENT_MAP.purple;

  const BrandPanel = t.brandPanel === 'minimal' ? BrandPanelMinimal
                  : t.brandPanel === 'testimonial' ? BrandPanelTestimonial
                  : BrandPanelPreview;

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: C.surface }}>
      {/* Brand panel */}
      <div style={{
        flex: '0 0 54%',
        background: `linear-gradient(135deg, ${tone.from} 0%, ${tone.via} 50%, ${tone.to} 100%)`,
        display: 'flex',
      }}>
        <BrandPanel />
      </div>

      {/* Form panel */}
      <div style={{
        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '40px 56px', position: 'relative',
      }}>
        {/* Top-right help */}
        <div style={{ position: 'absolute', top: 28, right: 40, display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 13, color: C.secondary }}>Precisa de ajuda?</span>
          <a href="#" style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '6px 12px', borderRadius: 999,
            background: '#fff', border: `1px solid ${C.outlineVariant}`,
            fontSize: 13, fontWeight: 600, color: C.onSurface, textDecoration: 'none',
          }}>
            <Mso name="support_agent" size={16} fill={1} style={{ color: tone.btn }} />
            Falar com o suporte
          </a>
        </div>

        <LoginForm showSSO={t.showSSO} showRemember={t.showRemember} accent={t.accent} />

        {/* Bottom-right language */}
        <div style={{ position: 'absolute', bottom: 28, right: 40, display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: C.secondary }}>
          <Mso name="language" size={14} />
          Português (BR)
          <Mso name="expand_more" size={14} />
        </div>
      </div>

      <window.TweaksPanel>
        <window.TweakSection label="Layout">
          <window.TweakRadio
            label="Painel da marca"
            value={t.brandPanel}
            onChange={(v) => setTweak('brandPanel', v)}
            options={[
              { value: 'preview', label: 'Preview' },
              { value: 'minimal', label: 'Minimal' },
              { value: 'testimonial', label: 'Depoimento' },
            ]}
          />
          <window.TweakRadio
            label="Tom da marca"
            value={t.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              { value: 'purple', label: 'Roxo' },
              { value: 'indigo', label: 'Índigo' },
              { value: 'ocean',  label: 'Oceano' },
            ]}
          />
        </window.TweakSection>
        <window.TweakSection label="Formulário">
          <window.TweakToggle
            label="Mostrar login social (Google / Microsoft)"
            value={t.showSSO}
            onChange={(v) => setTweak('showSSO', v)}
          />
          <window.TweakToggle
            label="Mostrar 'Lembrar de mim'"
            value={t.showRemember}
            onChange={(v) => setTweak('showRemember', v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
