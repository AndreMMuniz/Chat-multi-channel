<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0F172A"/>

  <!-- Three arcs forming an O — each arc = one channel -->
  <!-- Blue arc (top-right) -->
  <path d="M 50 18 A 32 32 0 0 1 77.7 66"
        fill="none" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
  <!-- Teal arc (bottom) -->
  <path d="M 77.7 66 A 32 32 0 0 1 22.3 66"
        fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round"/>
  <!-- White arc (top-left) -->
  <path d="M 22.3 66 A 32 32 0 0 1 50 18"
        fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
</svg>
