// ─── Tiny helpers ─────────────────────────────────────────────────────────────
function Icon({ name, size=20, fill=0, color, style={} }) {
  return <span className="mso" style={{ fontSize:size, fontVariationSettings:`'FILL' ${fill}`, color, ...style }}>{name}</span>;
}

function Avatar({ agent, name, size=36 }) {
  const a = agent || { name: name||'?', color:'#ede9fe', text:'#7C4DFF' };
  const initials = (a.name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  return (
    <div title={a.name} style={{
      width:size, height:size, borderRadius:'50%', background:a.color, color:a.text,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:size*0.36, fontWeight:700, flexShrink:0,
    }}>{initials}</div>
  );
}

function ChannelBadge({ channel, compact=false }) {
  const m = CHANNEL_META[channel]; if(!m) return null;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:4,
      background:m.bg, color:m.text, border:`1px solid ${m.border}`,
      borderRadius:100, padding: compact ? '2px 6px' : '3px 9px', fontSize: compact?10:11, fontWeight:600, whiteSpace:'nowrap' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:m.dot, flexShrink:0 }} />
      {m.label}
    </span>
  );
}

function TagBadge({ tagId }) {
  const t = TAG_OPTS.find(t=>t.id===tagId); if(!t) return null;
  return <span style={{ background:t.bg, color:t.text, border:`1px solid ${t.border}`, borderRadius:100, padding:'2px 8px', fontSize:10, fontWeight:600 }}>{t.label}</span>;
}

function StatusBadge({ status }) {
  const map = {
    open:   { bg:'#fdf4ff', text:'#7C4DFF', border:'#e9d5ff', label:'Aberto' },
    closed: { bg:'#f0fdf4', text:'#15803d', border:'#bbf7d0', label:'Fechado' },
    pending:{ bg:'#fffbeb', text:'#92400e', border:'#fde68a', label:'Pendente' },
  };
  const m = map[status]||map.open;
  return <span style={{ background:m.bg, color:m.text, border:`1px solid ${m.border}`, borderRadius:100, padding:'3px 10px', fontSize:11, fontWeight:600 }}>{m.label}</span>;
}

// ─── Logo / SideNav ───────────────────────────────────────────────────────────
function OmnichatLogo({ size=22 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <path d="M 50 18 A 32 32 0 0 1 77.7 66" fill="none" stroke="white" strokeWidth="13" strokeLinecap="round"/>
      <path d="M 77.7 66 A 32 32 0 0 1 22.3 66" fill="none" stroke="#c7d2fe" strokeWidth="13" strokeLinecap="round"/>
      <path d="M 22.3 66 A 32 32 0 0 1 50 18" fill="none" stroke="white" strokeWidth="13" strokeLinecap="round" opacity="0.7"/>
    </svg>
  );
}

function SideNav({ screen, onNav }) {
  const items = [
    { id:'dashboard', icon:'dashboard' }, { id:'messages', icon:'chat_bubble' },
    { id:'pipeline',  icon:'view_kanban' }, { id:'catalog', icon:'inventory_2' },
    { id:'tasks',     icon:'task' },
  ];
  const admin = [{ id:'users', icon:'group' }, { id:'settings', icon:'settings' }];
  const Btn = ({ item }) => {
    const active = screen===item.id;
    return (
      <button title={item.id} onClick={()=>onNav(item.id)}
        style={{ position:'relative', width:48, height:48, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center',
          background: active ? '#eef2ff' : 'transparent', color: active ? '#4338ca' : '#94a3b8',
          border:'none', cursor:'pointer', transition:'all 0.12s' }}
        onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background='#f8fafc'; e.currentTarget.style.color='#475569'; }}}
        onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#94a3b8'; }}}
      >
        {active && <div style={{ position:'absolute', left:-8, top:'50%', transform:'translateY(-50%)', width:3, height:24, background:'#4f46e5', borderRadius:'0 4px 4px 0' }} />}
        <Icon name={item.icon} size={22} fill={active?1:0} />
      </button>
    );
  };
  return (
    <nav style={{ width:64, height:'100%', background:'white', borderRight:`1px solid ${C.outlineVariant}`, display:'flex', flexDirection:'column', alignItems:'center', padding:'16px 0', flexShrink:0 }}>
      <div style={{ width:40, height:40, background:'#4f46e5', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:16 }}>
        <OmnichatLogo size={22} />
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4, width:'100%', padding:'0 8px' }}>
        {items.map(i=><Btn key={i.id} item={i} />)}
        <div style={{ width:32, height:1, background:C.outlineVariant, margin:'4px 0' }} />
        {admin.map(i=><Btn key={i.id} item={i} />)}
      </div>
      <button style={{ width:48, height:48, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', background:'transparent', color:'#94a3b8', border:'none', cursor:'pointer' }}
        onMouseEnter={e=>{ e.currentTarget.style.background='#fff1f2'; e.currentTarget.style.color='#ef4444'; }}
        onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#94a3b8'; }}
      ><Icon name="logout" size={20} /></button>
    </nav>
  );
}

// ─── Conversation List ────────────────────────────────────────────────────────
function ConvList({ conversations, selectedId, onSelect, compact }) {
  const [search, setSearch] = useState('');
  const [channelFilter, setChannelFilter] = useState('ALL');
  const [tagFilter, setTagFilter] = useState('ALL');

  const filtered = conversations.filter(c => {
    const q = search.toLowerCase();
    if (q && !c.name.toLowerCase().includes(q) && !c.identifier.toLowerCase().includes(q)) return false;
    if (channelFilter !== 'ALL' && c.channel !== channelFilter) return false;
    if (tagFilter !== 'ALL' && c.tag !== tagFilter) return false;
    return true;
  });

  return (
    <aside style={{ width:320, borderRight:`1px solid ${C.outlineVariant}`, background:'white', display:'flex', flexDirection:'column', flexShrink:0, overflow:'hidden' }}>
      {/* Search */}
      <div style={{ padding:'12px 12px 0' }}>
        <div style={{ position:'relative', display:'flex', alignItems:'center', background:'#f1f5f9', borderRadius:9, marginBottom:8 }}>
          <Icon name="search" size={16} color="#94a3b8" style={{ position:'absolute', left:10 }} />
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar conversas…"
            style={{ width:'100%', height:36, background:'transparent', border:'none', outline:'none', paddingLeft:32, paddingRight:10, fontSize:13, fontFamily:'Inter,sans-serif', color:C.onSurface }} />
          {search && <button onClick={()=>setSearch('')} style={{ position:'absolute', right:8, border:'none', background:'transparent', cursor:'pointer', color:'#94a3b8', display:'flex' }}>
            <Icon name="close" size={14} />
          </button>}
        </div>
        {/* Channel chips */}
        <div style={{ display:'flex', gap:5, overflowX:'auto', paddingBottom:8, scrollbarWidth:'none' }}>
          {['ALL','WHATSAPP','TELEGRAM','EMAIL','SMS'].map(ch => {
            const active = channelFilter===ch;
            const m = CHANNEL_META[ch];
            return (
              <button key={ch} onClick={()=>setChannelFilter(ch)}
                style={{ flexShrink:0, borderRadius:100, padding:'3px 10px', fontSize:11, fontWeight:600, border:`1px solid ${active ? '#c7d2fe' : '#e2e8f0'}`, background: active ? '#eef2ff' : 'white', color: active ? '#4338ca' : C.secondary, cursor:'pointer', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:4 }}>
                {m && <span style={{ width:5, height:5, borderRadius:'50%', background:m.dot }} />}
                {ch === 'ALL' ? 'Todos' : m?.label}
              </button>
            );
          })}
        </div>
        {/* Tag chips */}
        <div style={{ display:'flex', gap:5, overflowX:'auto', paddingBottom:10, scrollbarWidth:'none' }}>
          {['ALL', ...TAG_OPTS.map(t=>t.id)].map(tid => {
            const active = tagFilter===tid;
            const t = TAG_OPTS.find(t=>t.id===tid);
            return (
              <button key={tid} onClick={()=>setTagFilter(tid)}
                style={{ flexShrink:0, borderRadius:100, padding:'3px 10px', fontSize:10, fontWeight:600, border:`1px solid ${active ? (t?.border||'#c7d2fe') : '#e2e8f0'}`, background: active ? (t?.bg||'#eef2ff') : 'white', color: active ? (t?.text||'#4338ca') : C.secondary, cursor:'pointer', whiteSpace:'nowrap' }}>
                {tid==='ALL' ? 'Todas tags' : t?.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* Divider */}
      <div style={{ height:1, background:C.outlineVariant, flexShrink:0 }} />

      {/* List */}
      <div style={{ flex:1, overflowY:'auto', padding:'6px 6px' }}>
        {filtered.length === 0 && (
          <div style={{ textAlign:'center', padding:'32px 16px', color:'#94a3b8', fontSize:13 }}>Nenhuma conversa encontrada</div>
        )}
        {filtered.map(conv => {
          const active = conv.id===selectedId;
          return (
            <div key={conv.id} className={active ? '' : 'conv-item'}
              onClick={()=>onSelect(conv.id)}
              style={{ position:'relative', borderRadius:9, padding: compact ? '8px 10px 8px 13px' : '10px 10px 10px 13px', border:`1px solid ${active ? '#c7d2fe' : 'transparent'}`, background: active ? C.surfaceContainer : 'transparent', cursor:'pointer', display:'flex', gap:10, marginBottom:2, transition:'background 0.1s' }}>
              {active && <div style={{ position:'absolute', left:0, top:'50%', transform:'translateY(-50%)', width:3, height:28, background:'#4f46e5', borderRadius:'0 4px 4px 0' }} />}
              {/* Avatar with channel dot */}
              <div style={{ position:'relative', flexShrink:0 }}>
                <Avatar agent={conv.agent || { name:conv.name, color:'#ede9fe', text:'#7C4DFF' }} size={compact?34:38} />
                <div style={{ position:'absolute', bottom:-2, right:-2, width:14, height:14, background:'white', border:`1px solid ${C.outlineVariant}`, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ width:6, height:6, borderRadius:'50%', background:CHANNEL_META[conv.channel]?.dot||'#94a3b8', display:'block' }} />
                </div>
                {conv.unread && <div style={{ position:'absolute', top:-1, left:-1, width:9, height:9, background:'#22c55e', border:'2px solid white', borderRadius:'50%' }} />}
              </div>
              {/* Content */}
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:2 }}>
                  <span style={{ fontSize:13, fontWeight: conv.unread ? 600 : 500, color:C.onSurface, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:130 }}>{conv.name}</span>
                  <span style={{ fontSize:10, color: conv.slaBreached ? '#ef4444' : '#94a3b8', fontWeight: conv.slaBreached ? 600 : 400, flexShrink:0 }}>{conv.time}</span>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:2, flexWrap:'wrap' }}>
                  <TagBadge tagId={conv.tag} />
                  {conv.slaBreached && <span style={{ fontSize:9, color:'#ef4444', fontWeight:700, display:'flex', alignItems:'center', gap:1 }}><Icon name="warning" size={10} fill={1} color="#ef4444" />{conv.waitLabel}</span>}
                </div>
                <p style={{ fontSize:12, color: conv.unread ? '#374151' : '#94a3b8', fontWeight: conv.unread ? 500 : 400, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{conv.lastMsg}</p>
              </div>
            </div>
          );
        })}
      </div>
    </aside>
  );
}

// ─── Quick Reply Popover ───────────────────────────────────────────────────────
function QuickReplyPopover({ filter, onSelect, onClose }) {
  const matches = QUICK_REPLIES.filter(qr =>
    qr.shortcut.includes(filter) || qr.title.toLowerCase().includes(filter.replace('/','').toLowerCase())
  );
  if (matches.length === 0) return null;
  return (
    <div className="fade-up" style={{ position:'absolute', bottom:'calc(100% + 8px)', left:0, right:0, background:'white', border:`1px solid ${C.outlineVariant}`, borderRadius:12, boxShadow:'0 8px 24px rgba(0,0,0,0.12)', zIndex:50, overflow:'hidden', maxHeight:240, overflowY:'auto' }}>
      <div style={{ padding:'8px 12px 6px', display:'flex', alignItems:'center', gap:6, borderBottom:`1px solid #f1f5f9` }}>
        <Icon name="quick_phrases" size={14} color="#7C4DFF" />
        <span style={{ fontSize:10, fontWeight:700, color:'#7C4DFF', textTransform:'uppercase', letterSpacing:'0.06em' }}>Respostas rápidas</span>
      </div>
      {matches.map(qr => (
        <div key={qr.id} onClick={()=>onSelect(qr.body)}
          style={{ padding:'10px 14px', cursor:'pointer', borderBottom:`1px solid #f8fafc`, transition:'background 0.1s' }}
          onMouseEnter={e=>e.currentTarget.style.background='#f5f3ff'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}
        >
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
            <span style={{ background:'#eef2ff', color:'#4338ca', border:'1px solid #c7d2fe', borderRadius:5, padding:'1px 6px', fontSize:10, fontWeight:700 }}>{qr.shortcut}</span>
            <span style={{ fontSize:12, fontWeight:600, color:C.onSurface }}>{qr.title}</span>
          </div>
          <p style={{ fontSize:12, color:C.secondary, lineHeight:1.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{qr.body}</p>
        </div>
      ))}
    </div>
  );
}

// ─── AI Panel ─────────────────────────────────────────────────────────────────
function AIPanel({ convId, onUse, isGenerating, onGenerate }) {
  const suggestions = AI_SUGGESTIONS_MAP[convId] || AI_SUGGESTIONS_MAP.default;
  return (
    <div style={{ borderTop:`1px solid ${C.outlineVariant}`, background:'white' }}>
      {/* Header */}
      <div style={{ padding:'10px 14px 8px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:20, height:20, borderRadius:5, background:'linear-gradient(135deg,#7C4DFF,#4338ca)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="auto_awesome" size={12} fill={1} color="white" />
          </div>
          <span style={{ fontSize:11, fontWeight:700, color:'#7C4DFF', textTransform:'uppercase', letterSpacing:'0.06em' }}>Sugestões de IA</span>
          {isGenerating && <div style={{ width:12, height:12, border:'2px solid rgba(124,77,255,0.3)', borderTop:'2px solid #7C4DFF', borderRadius:'50%', animation:'spin 0.7s linear infinite' }} />}
        </div>
        <button onClick={onGenerate}
          style={{ height:26, padding:'0 10px', borderRadius:7, border:'1px solid #e9d5ff', background: isGenerating ? '#f5f3ff' : 'white', fontSize:11, fontWeight:600, color:'#7C4DFF', cursor:'pointer', display:'flex', alignItems:'center', gap:5, transition:'all 0.12s' }}
          onMouseEnter={e=>{ e.currentTarget.style.background='#f5f3ff'; }}
          onMouseLeave={e=>{ e.currentTarget.style.background= isGenerating ? '#f5f3ff' : 'white'; }}
        >
          <Icon name="refresh" size={13} color="#7C4DFF" />
          {isGenerating ? 'Gerando…' : 'Gerar'}
        </button>
      </div>
      {/* Suggestions */}
      <div style={{ padding:'0 10px 10px', display:'flex', flexDirection:'column', gap:5 }}>
        {isGenerating ? (
          [1,2].map(i => (
            <div key={i} style={{ height:56, borderRadius:9, background:'linear-gradient(90deg,#f1f5f9 25%,#e8ecf0 50%,#f1f5f9 75%)', backgroundSize:'400px 100%', animation:'shimmer 1.2s infinite', border:'1px solid #f1f5f9' }} />
          ))
        ) : suggestions.map(s => (
          <div key={s.id} className="ai-card"
            onClick={()=>onUse(s.text)}
            style={{ padding:'9px 11px', borderRadius:9, background:'#faf5ff', border:'1px solid #ede9fe', cursor:'pointer', transition:'all 0.12s', position:'relative' }}>
            <p style={{ fontSize:12, color:'#374151', lineHeight:1.5, marginBottom:4 }}>{s.text}</p>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span style={{ fontSize:10, color:'#94a3b8' }}>Confiança</span>
              <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                <div style={{ width:50, height:3, background:'#e9d5ff', borderRadius:99 }}>
                  <div style={{ width:`${s.confidence}%`, height:'100%', background: s.confidence>85 ? '#7C4DFF' : '#a78bfa', borderRadius:99 }} />
                </div>
                <span style={{ fontSize:10, fontWeight:700, color:'#7C4DFF' }}>{s.confidence}%</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Right Panel ─────────────────────────────────────────────────────────────
function RightPanel({ conv, onTagChange, tweaks }) {
  const [tab, setTab] = useState(tweaks.rightPanelTab || 'contact');
  const [selectedAgent, setSelectedAgent] = useState(conv.agent?.id || '');
  const [convTag, setConvTag] = useState(conv.tag || '');
  const [convStatus, setConvStatus] = useState(conv.status || 'open');

  useEffect(() => {
    setTab(tweaks.rightPanelTab || 'contact');
  }, [tweaks.rightPanelTab]);

  const sectionLabel = { fontSize:10, fontWeight:700, color:C.secondary, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8, display:'block' };

  return (
    <aside style={{ width:280, borderLeft:`1px solid ${C.outlineVariant}`, background:'white', display:'flex', flexDirection:'column', flexShrink:0, overflow:'hidden' }}>
      {/* Tabs */}
      <div style={{ display:'flex', borderBottom:`1px solid ${C.outlineVariant}`, flexShrink:0 }}>
        {[['contact','person','Contato'],['details','info','Detalhes'],['history','history','Histórico']].map(([t,icon,label])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{ flex:1, height:44, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, border:'none', background:'transparent', cursor:'pointer', borderBottom: tab===t ? '2px solid #7C4DFF' : '2px solid transparent', color: tab===t ? '#7C4DFF' : '#94a3b8', transition:'all 0.12s' }}>
            <Icon name={icon} size={16} fill={tab===t?1:0} color={tab===t?'#7C4DFF':'#94a3b8'} />
            <span style={{ fontSize:10, fontWeight:600 }}>{label}</span>
          </button>
        ))}
      </div>

      <div style={{ flex:1, overflowY:'auto' }}>
        {tab === 'contact' && (
          <div style={{ padding:'16px 16px 0' }}>
            {/* Contact card */}
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8, marginBottom:16, paddingBottom:16, borderBottom:`1px solid ${C.outlineVariant}` }}>
              <Avatar agent={conv.agent || { name:conv.name, color:'#ede9fe', text:'#7C4DFF' }} size={52} />
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:15, fontWeight:700, color:C.onSurface }}>{conv.name}</div>
                <div style={{ fontSize:12, color:C.outline, marginTop:2 }}>{conv.identifier}</div>
              </div>
              <ChannelBadge channel={conv.channel} />
            </div>

            {/* Contact details */}
            <div style={{ marginBottom:14 }}>
              <span style={sectionLabel}>Detalhes do contato</span>
              {[
                { label:'Nome', value:conv.name },
                { label:'Identificador', value:conv.identifier },
                { label:'Canal', value:CHANNEL_META[conv.channel]?.label },
              ].map(({ label, value }) => (
                <div key={label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                  <span style={{ fontSize:12, color:C.outline }}>{label}</span>
                  <span style={{ fontSize:12, fontWeight:500, color:C.onSurface, textAlign:'right', maxWidth:150, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{value}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === 'details' && (
          <div style={{ padding:'16px' }}>
            {/* Status */}
            <div style={{ marginBottom:14 }}>
              <span style={sectionLabel}>Status da conversa</span>
              <div style={{ display:'flex', gap:6 }}>
                {['open','pending','closed'].map(s => {
                  const map = { open:{label:'Aberto',bg:'#fdf4ff',text:'#7C4DFF',border:'#e9d5ff'}, pending:{label:'Pendente',bg:'#fffbeb',text:'#92400e',border:'#fde68a'}, closed:{label:'Fechado',bg:'#f0fdf4',text:'#15803d',border:'#bbf7d0'} };
                  const m = map[s];
                  const active = convStatus===s;
                  return (
                    <button key={s} onClick={()=>setConvStatus(s)}
                      style={{ flex:1, padding:'5px 0', borderRadius:7, border:`1px solid ${active ? m.border : '#e2e8f0'}`, background: active ? m.bg : 'white', color: active ? m.text : C.secondary, fontSize:11, fontWeight:600, cursor:'pointer', transition:'all 0.12s' }}>
                      {m.label}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Agent */}
            <div style={{ marginBottom:14 }}>
              <span style={sectionLabel}>Agente responsável</span>
              <select value={selectedAgent} onChange={e=>setSelectedAgent(e.target.value)}
                style={{ width:'100%', height:36, padding:'0 10px', borderRadius:8, border:`1px solid #e2e8f0`, background:'#f8fafc', fontSize:13, color:C.onSurface, fontFamily:'Inter,sans-serif', outline:'none', cursor:'pointer' }}>
                <option value="">— Não atribuído —</option>
                {AGENTS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              {selectedAgent && (
                <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6 }}>
                  <Avatar agent={AGENTS.find(a=>a.id===selectedAgent)} size={22} />
                  <span style={{ fontSize:12, color:C.secondary }}>{AGENTS.find(a=>a.id===selectedAgent)?.name}</span>
                </div>
              )}
            </div>

            {/* Tags */}
            <div style={{ marginBottom:14 }}>
              <span style={sectionLabel}>Tag da conversa</span>
              <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                {TAG_OPTS.map(t => {
                  const active = convTag===t.id;
                  return (
                    <button key={t.id} onClick={()=>{ setConvTag(active ? '' : t.id); onTagChange && onTagChange(active ? '' : t.id); }}
                      style={{ borderRadius:100, padding:'3px 10px', fontSize:11, fontWeight:600, border:`1px solid ${active ? t.border : '#e2e8f0'}`, background: active ? t.bg : 'white', color: active ? t.text : C.secondary, cursor:'pointer', transition:'all 0.12s' }}>
                      {t.label}
                    </button>
                  );
                })}
              </div>
              {convTag && <div style={{ marginTop:6 }}><TagBadge tagId={convTag} /></div>}
              <p style={{ fontSize:10, color:'#94a3b8', marginTop:6, lineHeight:1.4 }}>Uma tag por conversa nesta versão.</p>
            </div>
          </div>
        )}

        {tab === 'history' && (
          <div style={{ padding:'16px' }}>
            <span style={sectionLabel}>Conversas anteriores</span>
            {[
              { date:'22 abr', channel:'WHATSAPP', preview:'Problema com entrega resolvido.', resolved:true },
              { date:'10 abr', channel:'EMAIL',    preview:'Solicitação de nota fiscal.',     resolved:true },
              { date:'02 mar', channel:'TELEGRAM', preview:'Dúvida sobre planos.',            resolved:true },
            ].map((h,i) => (
              <div key={i} style={{ padding:'10px 0', borderBottom:`1px solid #f1f5f9`, cursor:'pointer' }}
                onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:3 }}>
                  <ChannelBadge channel={h.channel} compact />
                  <span style={{ fontSize:10, color:'#94a3b8' }}>{h.date}</span>
                </div>
                <p style={{ fontSize:12, color:C.secondary }}>{h.preview}</p>
                {h.resolved && <span style={{ fontSize:10, color:'#15803d', fontWeight:600 }}>✓ Resolvido</span>}
              </div>
            ))}
          </div>
        )}
      </div>
    </aside>
  );
}

// ─── Chat Window ──────────────────────────────────────────────────────────────
function ChatWindow({ conv, messages, onSend, tweaks, showAIPanel }) {
  const [input, setInput] = useState('');
  const [showQR, setShowQR] = useState(false);
  const [qrFilter, setQrFilter] = useState('');
  const [aiGenerating, setAiGenerating] = useState(false);
  const [showAI, setShowAI] = useState(showAIPanel !== false);
  const endRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    setShowAI(tweaks.showAIPanel !== false);
  }, [tweaks.showAIPanel]);

  const scrollToBottom = () => {
    if (endRef.current) {
      endRef.current.parentElement.scrollTop = endRef.current.parentElement.scrollHeight;
    }
  };

  useEffect(() => { scrollToBottom(); }, [messages]);

  const handleInput = (e) => {
    const v = e.target.value;
    setInput(v);
    if (v.startsWith('/')) { setShowQR(true); setQrFilter(v); }
    else { setShowQR(false); }
  };

  const handleSend = () => {
    if (!input.trim()) return;
    onSend(input.trim());
    setInput('');
    setShowQR(false);
    inputRef.current?.focus();
  };

  const handleQRSelect = (body) => {
    setInput(body);
    setShowQR(false);
    inputRef.current?.focus();
  };

  const handleAIUse = (text) => {
    setInput(text);
    inputRef.current?.focus();
  };

  const handleGenerate = () => {
    setAiGenerating(true);
    setTimeout(() => setAiGenerating(false), 1800);
  };

  const msgs = messages || [];
  const statusColors = { open:'#f97316', pending:'#f59e0b', closed:'#10b981' };
  const statusBg = { open:'#fff7ed', pending:'#fffbeb', closed:'#f0fdf4' };
  const statusBorder = { open:'#fed7aa', pending:'#fde68a', closed:'#bbf7d0' };

  return (
    <section style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0 }}>
      {/* Chat header */}
      <div style={{ height:64, borderBottom:`1px solid ${C.outlineVariant}`, background:'white', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 18px', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <Avatar agent={conv.agent || { name:conv.name, color:'#ede9fe', text:'#7C4DFF' }} size={40} />
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:C.onSurface, letterSpacing:-0.2 }}>{conv.name}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:2 }}>
              <ChannelBadge channel={conv.channel} compact />
              <TagBadge tagId={conv.tag} />
              {conv.slaBreached && (
                <span style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:10, fontWeight:700, color:'#dc2626' }}>
                  <Icon name="warning" size={11} fill={1} color="#dc2626" />SLA: {conv.waitLabel}
                </span>
              )}
            </div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {/* Watching indicator */}
          <div style={{ display:'flex', alignItems:'center', gap:5, background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:100, padding:'3px 9px' }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background:'#f97316', animation:'aiPulse 2s infinite' }} />
            <span style={{ fontSize:11, fontWeight:600, color:'#c2410c' }}>Admin visualizando</span>
          </div>

          {/* Status picker */}
          <select style={{ height:30, padding:'0 10px', borderRadius:100, fontSize:11, fontWeight:600, border:`1px solid ${statusBorder[conv.status]||'#e2e8f0'}`, background: statusBg[conv.status]||'#f8fafc', color: statusColors[conv.status]||C.secondary, cursor:'pointer', fontFamily:'Inter,sans-serif', outline:'none' }}>
            <option value="open">Aberto</option>
            <option value="pending">Pendente</option>
            <option value="closed">Fechado</option>
          </select>

          {/* AI toggle */}
          <button onClick={()=>setShowAI(v=>!v)} title="Sugestões IA"
            style={{ width:32, height:32, borderRadius:8, border:`1px solid ${showAI ? '#e9d5ff' : C.outlineVariant}`, background: showAI ? '#f5f3ff' : 'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.12s' }}>
            <Icon name="auto_awesome" size={16} fill={showAI?1:0} color={showAI ? '#7C4DFF' : '#94a3b8'} />
          </button>

          <button style={{ width:32, height:32, borderRadius:8, border:`1px solid ${C.outlineVariant}`, background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#94a3b8' }}>
            <Icon name="mark_email_unread" size={16} />
          </button>
          <button style={{ width:32, height:32, borderRadius:8, border:`1px solid ${C.outlineVariant}`, background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#94a3b8' }}>
            <Icon name="more_vert" size={16} />
          </button>
        </div>
      </div>

      {/* Messages area */}
      <div style={{ flex:1, overflowY:'auto', padding:'20px 20px 10px', display:'flex', flexDirection:'column', gap:14, background:C.surface }}>
        {msgs.map(msg => (
          <div key={msg.id} className="fade-up" style={{ display:'flex', maxWidth:'72%', alignSelf: msg.inbound ? 'flex-start' : 'flex-end' }}>
            <div style={{ display:'flex', flexDirection:'column', alignItems: msg.inbound ? 'flex-start' : 'flex-end', gap:4 }}>
              <div style={{ display:'flex', alignItems:'baseline', gap:8, flexDirection: msg.inbound ? 'row' : 'row-reverse' }}>
                <span style={{ fontSize:11, fontWeight:600, color:'#374151' }}>{msg.inbound ? conv.name.split(' ')[0] : 'Você'}</span>
                <span style={{ fontSize:10, color:'#94a3b8' }}>{msg.time}</span>
              </div>
              <div style={{ padding:'10px 14px', borderRadius: msg.inbound ? '4px 14px 14px 14px' : '14px 4px 14px 14px', background: msg.inbound ? 'white' : '#4f46e5', border: msg.inbound ? `1px solid ${C.outlineVariant}` : 'none', color: msg.inbound ? C.onSurface : 'white', fontSize:14, lineHeight:1.5, boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
                {msg.content}
              </div>
              {!msg.inbound && (
                <div style={{ display:'flex', alignItems:'center', gap:3 }}>
                  <Icon name={msg.status==='read' ? 'done_all' : 'done'} size={12} color={msg.status==='read' ? '#7C4DFF' : '#94a3b8'} fill={1} />
                  <span style={{ fontSize:10, color:'#94a3b8' }}>{msg.status==='read' ? 'Lido' : 'Entregue'}</span>
                </div>
              )}
            </div>
          </div>
        ))}
        <div ref={endRef} />
      </div>

      {/* Quick Reply chips strip */}
      <div style={{ padding:'6px 14px 0', background:'white', borderTop:`1px solid ${C.outlineVariant}`, display:'flex', gap:6, overflowX:'auto', scrollbarWidth:'none' }}>
        {QUICK_REPLIES.slice(0,4).map(qr => (
          <button key={qr.id} className="qr-chip" onClick={()=>{ setInput(qr.body); inputRef.current?.focus(); }}
            style={{ flexShrink:0, height:26, padding:'0 10px', borderRadius:100, border:'1px solid #e2e8f0', background:'white', fontSize:11, fontWeight:600, color:C.secondary, cursor:'pointer', display:'flex', alignItems:'center', gap:4, transition:'all 0.12s', whiteSpace:'nowrap' }}>
            <span style={{ background:'#eef2ff', color:'#4338ca', border:'1px solid #c7d2fe', borderRadius:4, padding:'0 4px', fontSize:9, fontWeight:700 }}>{qr.shortcut}</span>
            {qr.title}
          </button>
        ))}
        <button style={{ flexShrink:0, height:26, padding:'0 10px', borderRadius:100, border:'1px solid #e2e8f0', background:'white', fontSize:11, fontWeight:600, color:C.secondary, cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
          <Icon name="more_horiz" size={14} color={C.secondary} />
          Mais
        </button>
      </div>

      {/* Composer */}
      <div style={{ padding:'10px 14px 12px', background:'white', position:'relative' }}>
        {showQR && <QuickReplyPopover filter={qrFilter} onSelect={handleQRSelect} onClose={()=>setShowQR(false)} />}
        <div style={{ display:'flex', alignItems:'center', gap:6, background:'#f1f5f9', borderRadius:12, padding:'5px 6px', border:'1px solid transparent', transition:'border-color 0.12s' }}
          onFocusCapture={e=>e.currentTarget.style.borderColor='#c7d2fe'}
          onBlurCapture={e=>e.currentTarget.style.borderColor='transparent'}
        >
          {/* Emoji */}
          <button style={{ width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', border:'none', background:'transparent', borderRadius:7, cursor:'pointer', color:'#94a3b8', flexShrink:0 }}
            onMouseEnter={e=>{ e.currentTarget.style.background='#e2e8f0'; }}
            onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; }}>
            <Icon name="mood" size={19} />
          </button>
          {/* Attach */}
          <button style={{ width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', border:'none', background:'transparent', borderRadius:7, cursor:'pointer', color:'#94a3b8', flexShrink:0 }}
            onMouseEnter={e=>{ e.currentTarget.style.background='#e2e8f0'; }}
            onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; }}>
            <Icon name="attach_file" size={19} />
          </button>
          {/* Input */}
          <input ref={inputRef} value={input} onChange={handleInput}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); handleSend(); } }}
            placeholder="Digite uma mensagem ou / para respostas rápidas…"
            style={{ flex:1, background:'transparent', border:'none', outline:'none', fontSize:13, color:C.onSurface, fontFamily:'Inter,sans-serif', padding:'4px 0' }}
          />
          {/* Quick reply icon */}
          <button onClick={()=>{ setInput('/'); setShowQR(true); setQrFilter('/'); inputRef.current?.focus(); }}
            title="Respostas rápidas"
            style={{ width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', border:'none', background:'transparent', borderRadius:7, cursor:'pointer', color:'#94a3b8', flexShrink:0 }}
            onMouseEnter={e=>{ e.currentTarget.style.background='#e2e8f0'; e.currentTarget.style.color='#4338ca'; }}
            onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#94a3b8'; }}>
            <Icon name="quick_phrases" size={18} />
          </button>
          {/* AI button */}
          <button onClick={()=>{ setShowAI(v=>!v); }}
            title="Sugestões IA"
            style={{ width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', border:'none', background: showAI ? '#f5f3ff' : 'transparent', borderRadius:7, cursor:'pointer', flexShrink:0, transition:'all 0.12s' }}
            onMouseEnter={e=>{ if(!showAI) e.currentTarget.style.background='#f5f3ff'; }}
            onMouseLeave={e=>{ if(!showAI) e.currentTarget.style.background='transparent'; }}>
            <Icon name="auto_awesome" size={18} fill={showAI?1:0} color={showAI?'#7C4DFF':'#94a3b8'} />
          </button>
          {/* Send */}
          <button onClick={handleSend}
            style={{ width:36, height:36, background: input.trim() ? '#4f46e5' : '#e2e8f0', border:'none', borderRadius:9, display:'flex', alignItems:'center', justifyContent:'center', cursor: input.trim() ? 'pointer' : 'default', flexShrink:0, transition:'background 0.12s', boxShadow: input.trim() ? '0 2px 8px rgba(79,70,229,0.3)' : 'none' }}
            onMouseEnter={e=>{ if(input.trim()) e.currentTarget.style.background='#4338ca'; }}
            onMouseLeave={e=>{ if(input.trim()) e.currentTarget.style.background='#4f46e5'; }}
          >
            <Icon name="send" size={17} fill={1} color={input.trim() ? 'white' : '#94a3b8'} />
          </button>
        </div>
      </div>

      {/* AI Panel */}
      {showAI && <AIPanel convId={conv.id} onUse={handleAIUse} isGenerating={aiGenerating} onGenerate={handleGenerate} />}
    </section>
  );
}

// ─── Messages Screen ──────────────────────────────────────────────────────────
function MessagesScreen({ tweaks }) {
  const [selectedId, setSelectedId] = useState('1');
  const [messages, setMessages] = useState(MESSAGES_INIT);

  const conv = CONVERSATIONS.find(c=>c.id===selectedId);
  const msgs = messages[selectedId]||[];

  const handleSend = (text) => {
    const msg = { id:`m${Date.now()}`, inbound:false, content:text, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), status:'delivered' };
    setMessages(prev => ({ ...prev, [selectedId]: [...(prev[selectedId]||[]), msg] }));
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Page header */}
      <div style={{ height:56, borderBottom:`1px solid ${C.outlineVariant}`, background:'white', display:'flex', alignItems:'center', padding:'0 20px', flexShrink:0, gap:10 }}>
        <Icon name="chat_bubble" size={20} fill={1} color="#7C4DFF" />
        <span style={{ fontSize:16, fontWeight:700, color:C.onSurface }}>Mensagens</span>
        <div style={{ marginLeft:8, background:'#eef2ff', color:'#4338ca', border:'1px solid #c7d2fe', borderRadius:100, padding:'2px 9px', fontSize:11, fontWeight:700 }}>
          {CONVERSATIONS.filter(c=>c.unread).length} não lidas
        </div>
      </div>
      {/* Body */}
      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
        <ConvList conversations={CONVERSATIONS} selectedId={selectedId} onSelect={setSelectedId} compact={tweaks.compactList} />
        {conv ? (
          <>
            <ChatWindow conv={conv} messages={msgs} onSend={handleSend} tweaks={tweaks} showAIPanel={tweaks.showAIPanel} />
            <RightPanel conv={conv} tweaks={tweaks} />
          </>
        ) : (
          <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'#94a3b8' }}>
            <div style={{ textAlign:'center' }}>
              <Icon name="chat_bubble_outline" size={40} color="#c7d2fe" />
              <p style={{ marginTop:8, fontSize:14 }}>Selecione uma conversa</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Tweaks ───────────────────────────────────────────────────────────────────
function ChatTweaks({ tweaks, setTweak }) {
  return (
    <TweaksPanel title="Tweaks — Chat">
      <TweakSection title="Painel de IA">
        <TweakToggle label="Mostrar sugestões de IA" value={tweaks.showAIPanel} onChange={v=>setTweak('showAIPanel', v)} />
      </TweakSection>
      <TweakSection title="Painel direito">
        <TweakRadio label="Aba inicial" value={tweaks.rightPanelTab}
          options={[{value:'contact',label:'Contato'},{value:'details',label:'Detalhes'},{value:'history',label:'Histórico'}]}
          onChange={v=>setTweak('rightPanelTab', v)} />
      </TweakSection>
      <TweakSection title="Lista">
        <TweakToggle label="Lista compacta" value={tweaks.compactList} onChange={v=>setTweak('compactList', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const { tweaks: rawTweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const tweaks = rawTweaks || TWEAK_DEFAULTS;
  const [screen, setScreen] = useState('messages');

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <SideNav screen={screen} onNav={setScreen} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {screen === 'messages'
          ? <MessagesScreen tweaks={tweaks} />
          : (
            <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:8, color:'#94a3b8' }}>
              <Icon name="construction" size={40} color="#c7d2fe" />
              <span style={{ fontSize:14, fontWeight:500 }}>Em construção</span>
            </div>
          )
        }
      </div>
      <ChatTweaks tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
